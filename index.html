<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Ñasaindy AM</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{
  max-width:400px;
}

h1{
  font-size:30px;
  margin-bottom:10px;
}

.live{
  color:#ff2bbd;
  font-weight:bold;
  margin-bottom:20px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

button{
  background:#ff2bbd;
  color:white;
  border:none;
  padding:18px 40px;
  font-size:20px;
  font-weight:bold;
  border-radius:12px;
  cursor:pointer;
}

button:active{
  transform:scale(0.97);
}
</style>
</head>

<body>

<div class="container">

  <div class="live">🔴 24 HORAS EN VIVO</div>

  <h1>📻 Radio Ñasaindy AM</h1>

  <button onclick="playRadio()">ESCUCHA AHORA</button>

  <audio id="radio" preload="none">
    <source src="http://84.247.167.61:8000/stream" type="audio/mpeg">
  </audio>

</div>

<script>
function playRadio(){
  const radio = document.getElementById("radio");
  radio.play().catch(err => {
    alert("Si no suena, abre el link directo del stream en otra pestaña primero.");
    console.log(err);
  });
}
</script>

</body>
</html>
