<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Ñasaindy AM</title>

<style>
body{
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

h1{
  font-size:30px;
}

.status{
  color:#ff2bbd;
  margin-top:10px;
}
</style>
</head>

<body>

<div>
  <h1>📻 Radio Ñasaindy AM 620</h1>
  <div class="status">🔴 24 horas en vivo</div>
</div>

<audio id="radio" autoplay>
  <source src="https://radionasaindy.com.py/reproductor-nasaindy/player.html" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
  const audio = document.getElementById("radio");

  const playPromise = audio.play();

  if (playPromise !== undefined) {
    playPromise.catch(() => {
      // fallback automático sin botón visible
      document.body.addEventListener("click", () => {
        audio.play();
      }, { once: true });
    });
  }
});
</script>

</body>
</html>
