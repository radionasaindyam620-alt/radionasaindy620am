<!DOCTYPE html>
<html>
<head>
  <title>Radio Ñasaindy en Vivo</title>
</head>

<body style="margin:0; background:#000;">

  <audio id="radio" autoplay>
    <source src="http://84.247.167.61:8000/stream?sid=1" type="audio/mpeg">
  </audio>

  <script>
    const radio = document.getElementById("radio");

    // intenta reproducir apenas carga
    window.addEventListener("load", () => {
      const playPromise = radio.play();

      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // si el navegador bloquea autoplay, lo intenta sin redirigir
          document.body.addEventListener("click", () => {
            radio.play();
          }, { once: true });
        });
      }
    });
  </script>

</body>
</html>
