<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Ñasaindy AM 620</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.container{
  max-width:400px;
}

h1{
  font-size:32px;
  margin-bottom:10px;
}

.subtitle{
  opacity:0.7;
  margin-bottom:30px;
}

button{
  background:red;
  color:white;
  border:none;
  padding:20px 40px;
  font-size:20px;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#cc0000;
}
</style>
</head>

<body>

<div class="container">

  <h1>📻 Radio Ñasaindy AM 620</h1>
  <div class="subtitle">Escuchar en vivo</div>

  <button onclick="playRadio()">▶ ESCUCHAR AHORA</button>

  <audio id="radio">
    <source src="http://84.247.167.61:8000/stream?sid=1" type="audio/mpeg">
  </audio>

</div>

<script>
function playRadio(){
  const radio = document.getElementById("radio");
  radio.play().catch(()=>{
    alert("No se pudo reproducir el stream en este navegador.");
  });
}
</script>

</body>
</html>
