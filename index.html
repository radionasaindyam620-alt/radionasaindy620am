<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radio Ñasaindy AM</title>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
}

.box{
  max-width:320px;
}

.title{
  font-size:28px;
  font-weight:bold;
}

.live{
  color:red;
  margin-top:10px;
  animation:blink 1s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

.text{
  margin-top:10px;
  font-size:13px;
  opacity:0.7;
}
</style>
</head>

<body>

<div class="box">

  <div class="title">📻 RADIO ÑASAINDY AM</div>

  <div class="live">🔴 EN VIVO</div>

  <div class="text">Transmitiendo online 24/7</div>

  <audio id="radio">
    <source src="http://84.247.167.61:8000/stream?sid=1" type="audio/mpeg">
  </audio>

</div>

<script>
const radio = document.getElementById("radio");

window.onload = function () {
  const play = radio.play();

  if (play !== undefined) {
    play.catch(() => {
      document.body.addEventListener("click", () => {
        radio.play();
      }, { once: true });
    });
  }
};
</script>

</body>
</html>
